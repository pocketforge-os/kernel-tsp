# kernel-tsp release build + sign + publish
# ==========================================================================
# Trigger: tag push matching tsp-*.
# Runner: self-hosted Dell runner (org-level, label: build-lab).
#   - Reaches kubo at 127.0.0.1:5001 for IPFS publish.
#   - Assumes pf-ci-sign via OIDC to read the minisign key + passphrase
#     from AWS Secrets Manager. NO static key on the runner. tsp-zbg / infra-060.
#
# Steps:
#   1. Reproducible build (SOURCE_DATE_EPOCH + KBUILD vars).
#   2. Package artifacts (Image + DTB + modules tarball).
#   3. SHA-256 manifest.
#   4. Sign with PocketForge release key (minisign Ed25519).
#   5. Publish to GitHub Releases.
#   6. ipfs add each artifact; update vendor-manifest.
#
# ~10 min job.
# ==========================================================================
name: Release

on:
  push:
    tags:
      - 'tsp-*'

permissions:
  contents: write # publish GitHub Releases
  id-token: write # mint GitHub OIDC token for AWS pf-ci-sign role assumption

# Only one release build at a time on the Dell runner.
# Do NOT cancel-in-progress — a release build that started should finish.
concurrency:
  group: release-build
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, publish
    runs-on: [self-hosted, build-lab]
    timeout-minutes: 30

    # Signing is gated by the `sign` GitHub Environment (main-only deployment
    # policy). This is the ONLY path in the world that can assume pf-ci-sign —
    # the role's OIDC trust is pinned to
    # `repo:pocketforge-os/kernel-tsp:environment:sign`. See tsp-zbg / infra-060.
    environment: sign

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
        with:
          fetch-depth: 0  # full history for SOURCE_DATE_EPOCH

      - name: Build container image
        run: docker build -t pocketforge/kernel-build:ci .github/

      - name: Reproducible kernel build
        run: |
          mkdir -p out
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work/src:ro" \
            -v "$PWD/out:/work/out" \
            pocketforge/kernel-build:ci \
            bash -c '
              set -eux

              export ARCH=arm64
              export CROSS_COMPILE=aarch64-none-linux-gnu-
              export KBUILD_OUTPUT=/work/out/kernel

              # Reproducibility: pin all timestamps to the tagged commit
              export SOURCE_DATE_EPOCH=$(git -C /work/src log -1 --format=%ct)
              export KBUILD_BUILD_TIMESTAMP="@${SOURCE_DATE_EPOCH}"
              export KBUILD_BUILD_USER=pocketforge
              export KBUILD_BUILD_HOST=pocketforge-builder

              mkdir -p "$KBUILD_OUTPUT"

              cd /work/src
              make pocketforge_tsp_defconfig

              make -j$(nproc) \
                HOST_EXTRACFLAGS="-fcommon" \
                KCFLAGS="-Wno-error=incompatible-pointer-types -Wno-zero-length-bounds -Wno-misleading-indentation -Wno-psabi" \
                Image dtbs modules

              # Install modules to staging tree
              make \
                HOST_EXTRACFLAGS="-fcommon" \
                KCFLAGS="-Wno-error=incompatible-pointer-types -Wno-zero-length-bounds -Wno-misleading-indentation -Wno-psabi" \
                INSTALL_MOD_PATH=/work/out/kernel-modules \
                modules_install
            '

      - name: Package artifacts
        id: package
        run: |
          set -eux
          TAG="${GITHUB_REF_NAME}"
          STAGING="out/release"
          mkdir -p "$STAGING"

          # Copy kernel Image
          cp out/kernel/arch/arm64/boot/Image "$STAGING/Image"

          # Copy DTB
          cp out/kernel/arch/arm64/boot/dts/sunxi/pocketforge_tsp.dtb \
             "$STAGING/pocketforge_tsp.dtb"

          # Create modules tarball (deterministic: sorted, clamped mtime)
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          tar --sort=name \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              --clamp-mtime \
              --owner=0 --group=0 --numeric-owner \
              -cf - -C out/kernel-modules lib/modules/ \
            | xz -9 --threads=1 > "$STAGING/modules-${TAG}.tar.xz"

          # SHA-256 manifest
          cd "$STAGING"
          sha256sum Image pocketforge_tsp.dtb "modules-${TAG}.tar.xz" \
            > "SHA256SUMS"

          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Print for the log
          cat SHA256SUMS
          ls -lh .

      # Sign step: read the passphrase-encrypted minisign key + its passphrase from
      # AWS Secrets Manager via the OIDC-federated pf-ci-sign role. No static key
      # on this runner; no key in an Actions secret; key material lives on this
      # box for ~seconds during the sign, then disappears.
      # See tsp-zbg / .planning/infra/infra-060-secrets-management.md.

      - name: Ensure expect(1) is installed (used to feed minisign the passphrase)
        run: |
          command -v expect >/dev/null 2>&1 || sudo apt-get install -qq -y expect

      - name: Assume pf-ci-sign via OIDC (no static key)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::611492472006:role/pf-ci-sign
          aws-region: us-east-1

      - name: Sign artifacts
        run: |
          set -e -o pipefail
          STAGING="${{ steps.package.outputs.staging }}"
          TAG="${{ steps.package.outputs.tag }}"

          # Fetch both trust secrets. Only pf-ci-sign can do this — its OIDC
          # trust is pinned to `repo:pocketforge-os/kernel-tsp:environment:sign`.
          KEY_FILE="$(mktemp)"
          trap 'shred -u "$KEY_FILE" 2>/dev/null || rm -f "$KEY_FILE"' EXIT

          aws secretsmanager get-secret-value \
            --secret-id /pocketforge/trust/minisign-privkey \
            --query SecretString --output text > "$KEY_FILE"

          export MINISIGN_PASS="$(aws secretsmanager get-secret-value \
            --secret-id /pocketforge/trust/minisign-passphrase \
            --query SecretString --output text)"

          # Sign each artifact + the manifest via the helper script (keeps the
          # expect(1) heredoc out of this YAML file).
          chmod +x .github/scripts/sign-artifact.sh
          for f in "$STAGING/Image" \
                   "$STAGING/pocketforge_tsp.dtb" \
                   "$STAGING/modules-${TAG}.tar.xz" \
                   "$STAGING/SHA256SUMS"; do
            KEY_FILE="$KEY_FILE" ARTIFACT="$f" TAG="$TAG" \
              .github/scripts/sign-artifact.sh
          done

          unset MINISIGN_PASS

          echo "Signed artifacts:"
          ls -la "$STAGING"/*.minisig

      - name: Verify signatures against the published trust anchor (round-trip proof)
        run: |
          # Fetch the canonical pub from infra/trust/minisign.pub via raw URL —
          # avoids checkout of a second repo. This step FAILS the release if the
          # signatures don't verify against what we tell the world is our pub key.
          STAGING="${{ steps.package.outputs.staging }}"
          curl -fsSL -o "$STAGING/pocketforge.pub" \
            https://raw.githubusercontent.com/pocketforge-os/infra/main/trust/minisign.pub

          for f in Image pocketforge_tsp.dtb modules-${{ steps.package.outputs.tag }}.tar.xz SHA256SUMS; do
            minisign -Vm "$STAGING/$f" -p "$STAGING/pocketforge.pub"
          done
          echo "All signatures verified against the committed public key."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          TAG="${{ steps.package.outputs.tag }}"
          STAGING="${{ steps.package.outputs.staging }}"

          gh release create "$TAG" \
            --title "kernel-tsp ${TAG}" \
            --notes "PocketForge kernel build for TrimUI Smart Pro.

          **Artifacts:**
          - \`Image\` — Linux 4.9.191 kernel (arm64)
          - \`pocketforge_tsp.dtb\` — Device tree blob
          - \`modules-${TAG}.tar.xz\` — Kernel modules
          - \`SHA256SUMS\` — Integrity manifest
          - \`*.minisig\` — minisign Ed25519 signatures

          Verify with:
          \`\`\`
          # Fetch the canonical public key
          curl -O https://raw.githubusercontent.com/pocketforge-os/infra/main/trust/minisign.pub
          # Verify signatures
          minisign -Vm Image -p minisign.pub
          minisign -Vm pocketforge_tsp.dtb -p minisign.pub
          minisign -Vm SHA256SUMS -p minisign.pub
          # Verify hashes
          sha256sum -c SHA256SUMS
          \`\`\`
          Public key fingerprint: \`C958F0F49AE8C528\`" \
            "$STAGING"/Image \
            "$STAGING"/pocketforge_tsp.dtb \
            "$STAGING"/modules-"${TAG}".tar.xz \
            "$STAGING"/SHA256SUMS \
            "$STAGING"/*.minisig

      - name: Publish to IPFS
        run: |
          set -eux
          TAG="${{ steps.package.outputs.tag }}"
          STAGING="${{ steps.package.outputs.staging }}"
          IPFS_API="http://127.0.0.1:5001/api/v0"

          # Add each artifact via the kubo HTTP API and capture CIDs.
          # The ipfs CLI requires a local repo; the HTTP API does not.
          declare -A CIDS
          for f in Image pocketforge_tsp.dtb "modules-${TAG}.tar.xz" SHA256SUMS; do
            CID=$(curl -sf -X POST -F "file=@${STAGING}/${f}" \
              "${IPFS_API}/add?cid-version=1&quieter=true" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin)["Hash"])')
            CIDS["$f"]="$CID"
            echo "$f -> $CID"
          done

          # Pin all CIDs
          for CID in "${CIDS[@]}"; do
            curl -sf -X POST "${IPFS_API}/pin/add?arg=${CID}" > /dev/null
          done

          # Write CID map for the vendor-manifest update step
          for f in "${!CIDS[@]}"; do
            echo "$f=${CIDS[$f]}"
          done > "$STAGING/cid-map.txt"

          cat "$STAGING/cid-map.txt"

      - name: Update vendor-manifest
        if: success()
        env:
          # GITHUB_TOKEN is scoped to kernel-tsp only. Cross-repo push to
          # vendor-manifest requires a PAT with repo scope, stored as a
          # separate secret.
          VENDOR_MANIFEST_PAT: ${{ secrets.VENDOR_MANIFEST_PAT }}
        run: |
          set -eu
          TAG="${{ steps.package.outputs.tag }}"
          STAGING="${{ steps.package.outputs.staging }}"

          if [ -z "${VENDOR_MANIFEST_PAT:-}" ]; then
            echo "::warning::VENDOR_MANIFEST_PAT not set. Skipping vendor-manifest update."
            echo "Manually add the kernel-tsp artifacts to vendor-manifest/manifest.toml."
            exit 0
          fi

          # Clone vendor-manifest using the PAT for auth
          MANIFEST_DIR=$(mktemp -d)
          trap 'rm -rf "$MANIFEST_DIR"' EXIT
          git clone --depth=1 \
            "https://x-access-token:${VENDOR_MANIFEST_PAT}@github.com/pocketforge-os/vendor-manifest.git" \
            "$MANIFEST_DIR"

          # Read artifact sizes and SHAs from our build
          IMAGE_SHA=$(sha256sum "$STAGING/Image" | cut -d' ' -f1)
          IMAGE_SIZE=$(stat -c%s "$STAGING/Image")
          DTB_SHA=$(sha256sum "$STAGING/pocketforge_tsp.dtb" | cut -d' ' -f1)
          DTB_SIZE=$(stat -c%s "$STAGING/pocketforge_tsp.dtb")
          MODULES_SHA=$(sha256sum "$STAGING/modules-${TAG}.tar.xz" | cut -d' ' -f1)
          MODULES_SIZE=$(stat -c%s "$STAGING/modules-${TAG}.tar.xz")

          # Read CIDs from the IPFS step
          IMAGE_CID=$(grep "^Image=" "$STAGING/cid-map.txt" | cut -d= -f2)
          DTB_CID=$(grep "^pocketforge_tsp.dtb=" "$STAGING/cid-map.txt" | cut -d= -f2)
          MODULES_CID=$(grep "^modules-${TAG}.tar.xz=" "$STAGING/cid-map.txt" | cut -d= -f2)

          # Append new entries to manifest.toml
          {
            printf '\n# --- kernel-tsp %s (added by release.yml) ---\n\n' "$TAG"
            printf '[[blobs]]\npath = "kernel-tsp/%s/Image"\nsize = %s\nsha256 = "%s"\ncid = "%s"\ngroup = "kernel-tsp-%s"\n\n' \
              "$TAG" "$IMAGE_SIZE" "$IMAGE_SHA" "$IMAGE_CID" "$TAG"
            printf '[[blobs]]\npath = "kernel-tsp/%s/pocketforge_tsp.dtb"\nsize = %s\nsha256 = "%s"\ncid = "%s"\ngroup = "kernel-tsp-%s"\n\n' \
              "$TAG" "$DTB_SIZE" "$DTB_SHA" "$DTB_CID" "$TAG"
            printf '[[blobs]]\npath = "kernel-tsp/%s/modules.tar.xz"\nsize = %s\nsha256 = "%s"\ncid = "%s"\ngroup = "kernel-tsp-%s"\n' \
              "$TAG" "$MODULES_SIZE" "$MODULES_SHA" "$MODULES_CID" "$TAG"
          } >> "$MANIFEST_DIR/manifest.toml"

          # Commit and push
          cd "$MANIFEST_DIR"
          git config user.name "pocketforge-ci"
          git config user.email "ci@pocketforge.dev"
          git add manifest.toml
          git commit -m "kernel-tsp: add ${TAG} artifacts (Image + DTB + modules)"
          git push origin main
